
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 011: Dust on the Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #050507;
            --color-surface: #101010;
            --color-border: #3d3a39;
            --color-accent: #00d992;
            --color-text-pri: #f2f2f2;
            --color-text-sec: #b8b3b0;
            --color-text-acc: #2fd6a1;
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-text-pri);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 1000px;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 60px;
            letter-spacing: -0.65px;
            line-height: 1.0;
            margin: 0;
            text-transform: uppercase;
        }

        h1 span {
            color: var(--color-accent);
        }

        .meta {
            font-family: 'JetBrains Mono', monospace;
            color: var(--color-text-acc);
            margin-top: 10px;
            font-size: 14px;
        }

        .matrix-container {
            width: 100%;
            max-width: 1000px;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            padding: 32px;
            box-shadow: rgba(92, 88, 85, 0.2) 0px 0px 15px;
        }

        .grid-header {
            display: grid;
            grid-template-columns: 140px repeat(8, 1fr);
            gap: 10px;
            margin-bottom: 20px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--color-text-sec);
            font-size: 12px;
            border-bottom: 1px solid var(--color-border);
            padding-bottom: 10px;
        }

        .grid-row {
            display: grid;
            grid-template-columns: 140px repeat(8, 1fr);
            gap: 10px;
            margin-bottom: 15px;
            align-items: center;
        }

        .row-label {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
            color: var(--color-text-pri);
        }

        .cell {
            height: 30px;
            border-radius: 4px;
            background: rgba(61, 58, 57, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cell.active {
            background: var(--color-accent);
            box-shadow: 0 0 8px var(--color-accent);
        }

        .cell.subtle {
            background: #306cce;
            opacity: 0.6;
        }
        
        .cell.slide {
            background: linear-gradient(90deg, #818cf8, var(--color-accent));
            box-shadow: 0 0 4px #818cf8;
        }

        .footer-metrics {
            display: flex;
            gap: 40px;
            margin-top: 40px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--color-text-sec);
        }

        .metric b {
            color: var(--color-text-acc);
        }
    </style>
</head>
<body>

<header>
    <h1>Project <span>011</span></h1>
    <p class="meta">> DUST_ON_THE_DASHBOARD // POP_COUNTRY // G_MAJOR</p>
</header>

<div class="matrix-container">
    <div class="grid-header">
        <div>VOICE_ID</div>
        <div>1.1</div><div>1.2</div><div>1.3</div><div>1.4</div>
        <div>2.1</div><div>2.2</div><div>2.3</div><div>2.4</div>
    </div>

    <!-- Vocal Row -->
    <div class="grid-row">
        <div class="row-label">LEAD_VOCAL</div>
        <div class="cell active"></div><div class="cell"></div><div class="cell active"></div><div class="cell active"></div>
        <div class="cell"></div><div class="cell active"></div><div class="cell"></div><div class="cell active"></div>
    </div>

    <!-- Steel Guitar Row -->
    <div class="grid-row">
        <div class="row-label">STEEL_GT</div>
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        <div class="cell slide"></div><div class="cell slide"></div><div class="cell slide"></div><div class="cell slide"></div>
    </div>

    <!-- Acoustic Guitar Row -->
    <div class="grid-row">
        <div class="row-label">GT_STRUM</div>
        <div class="cell active"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        <div class="cell subtle"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    </div>

    <!-- Bass Row -->
    <div class="grid-row">
        <div class="row-label">BASS_ROOT</div>
        <div class="cell subtle"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    </div>
</div>

<div class="footer-metrics">
    <div class="metric">TEMPO: <b>110 BPM</b></div>
    <div class="metric">RHYTHM_DNA: <b>EUC(5,8)</b></div>
    <div class="metric">STEEL_SLIDE: <b>LEGATO_SWEEP</b></div>
</div>

</body>
</html>
